version: "3.9"

services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: ${LOCAL_DB_NAME:-zakbot}
      POSTGRES_USER: ${LOCAL_DB_USER:-postgres}
      POSTGRES_PASSWORD: ${LOCAL_DB_PASSWORD:-postgres}
    ports:
      - "${LOCAL_DB_PORT:-5432}:5432"
    volumes:
      - zakbot_postgres_data:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${LOCAL_DB_USER:-postgres} -d ${LOCAL_DB_NAME:-zakbot}"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
    env_file:
      - .env
    environment:
      DB_URL: ${DOCKER_DB_URL:-postgresql+asyncpg://postgres:postgres@db:5432/zakbot}
    ports:
      - "${PORT:-8000}:8000"
    depends_on:
      db:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port ${PORT:-8000}

volumes:
  zakbot_postgres_data:
